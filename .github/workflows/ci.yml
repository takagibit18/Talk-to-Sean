name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run knowledge:check
      - run: npm run build
        env:
          OPENAI_API_KEY: sk-ci-placeholder
          GITHUB_USERNAME: takagibit18

  e2e:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run e2e
        env:
          OPENAI_API_KEY: sk-ci-placeholder
          GITHUB_USERNAME: takagibit18
